// ===== Sound =====
let audio = null;

function getAudioContext() {
    if (!audio) {
        audio = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audio;
}

function playTone(freq, duration){
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = freq;
    osc.type = "triangle";
    gain.gain.value = 0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
}

function getGroupExplanation(question) {

    switch (question.group) {

        case "Group 1":
            return `
            <div class="explanation">
                <b>💡 Group 1 (う-verbs)</b><br><br>
                Change the final <b>i</b> sound to the <b>e</b> sound.<br><br>

                ${question.masu}
                <br>⬇<br>
                ${question.potentialMasu}
            </div>
            `;

        case "Group 2":
            return `
            <div class="explanation">
                <b>💡 Group 2 (る-verbs)</b><br><br>
                Remove <b>ます</b> and add <b>られます</b>.<br><br>

                ${question.masu}
                <br>⬇<br>
                ${question.potentialMasu}
            </div>
            `;

        case "Group 3":
            return `
            <div class="explanation">
                <b>💡 Group 3 (Irregular)</b><br><br>

                します → できます<br>
                きます → こられます<br><br>

                ${question.masu}
                <br>⬇<br>
                ${question.potentialMasu}
            </div>
            `;
    }

    return "";
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700, .08);
    setTimeout(() => { playTone(900, .12); }, 90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180, .25);
}

// 状態管理
let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function start() {
    quiz = shuffle(quizData);
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    document.getElementById("score").style.display = "block";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").textContent = current.emoji;
    document.getElementById("question").innerHTML =
        document.getElementById("mode").checked ? current.kanji : current.masu;
    
    document.getElementById("romaji").textContent =
        document.getElementById("romajiMode").checked ? current.romaji : "---";

    document.getElementById("groupDisplay").textContent = current.group ? current.group : "";
}

function nextQuestion() {
    document.getElementById("message").textContent = "";
    document.getElementById("explanation").style.display = "none";
    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        document.querySelector(".card").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").textContent = stars;
        document.getElementById("finalScore").textContent = `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    document.getElementById("currentNum").textContent = index + 1;
    document.getElementById("totalNum").textContent = quiz.length;
    const current = quiz[index];

    updateView();

    let choices = shuffle(current.choices);

    let html = "";
    choices.forEach(choice => {
        html += `<div class="answer" onclick="answer(this,'${choice}')">${choice}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}

    if(current.group === "Group 1"){
        return `
        <b>Group 1</b><br>
        Change the final <b>i</b> sound to the <b>e</b> sound.<br><br>
        ${current.masu}<br>⬇<br>${current.potentialMasu}
        `;
    }

    if(current.group === "Group 2"){
        return `
        <b>Group 2</b><br>
        Remove <b>ます</b> and add <b>られます</b>.<br><br>
        ${current.masu}<br>⬇<br>${current.potentialMasu}
        `;
    }

    return `
    <b>Group 3</b><br>
    します → できます<br>
    きます → こられます<br><br>
    ${current.masu}<br>⬇<br>${current.potentialMasu}
    `;
}

    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choice === current.potentialMasu) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").textContent = "✨ Correct!";
        document.getElementById("explanation").style.display = "none";
        correctSound();
    } else {
element.classList.add("wrong");
wrongSound();

document.getElementById("message").textContent =
"❌ Wrong!";

const exp = document.getElementById("explanation");
exp.innerHTML = `
<b>Correct answer:</b> ${current.potentialMasu}<br><br>
${getGroupExplanation(current)}
`;
exp.style.display = "block";
        wrongSound();
    }


    setTimeout(() => {

    start();
}

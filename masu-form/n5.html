<style>

body{

background:var(--bg-color);
display:flex;
flex-direction:column;
align-items:center;
padding: 10px 20px;
margin:0;
color:var(--text-main);

h1 {

.controls {
    display: flex;

.controls label {
    display: flex;
    align-items: center;

}
.emoji{

}

.question{
    font-size:32px;
    font-weight:bold;
}
.quiz-container{
    width:90%;
    max-width:400px;
    margin:0 auto;
}

.card {
    background-color: var(--card-bg);
    border: 3px solid var(--border-color);
    border-radius: 18px;
    padding: 15px; /* 余白を少し減らす */
    width: 100%;
    max-width: 600px;
    margin: 0 auto 15px auto; /* 下の余白も調整 */

    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
}

/* 絵文字を小さく（60px → 40px に変更） */

    font-size: 40px; 
    margin-bottom: 5px; /* 下の余白を詰める */

}

/* グループ表示 */

    margin-bottom: 10px;

    font-size: 14px;
}

#answers{

    cursor: pointer;

    font-size: 0.5em;

#question{
font-size:34px;
font-weight:bold;

/* ---------- Animation ---------- */

@keyframes bounce{
0%{transform:scale(1);}
35%{transform:scale(1.08);}
60%{transform:scale(.95);}
100%{transform:scale(1);}
}

@keyframes shake{
0%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-8px);}
80%{transform:translateX(8px);}
100%{transform:translateX(0);}
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.bounce{
animation:bounce .45s;

.shake{
animation:shake .45s;

.fade{
animation:fadeIn .4s;

// ===== Sound =====

const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){

const osc=audio.createOscillator();
const gain=audio.createGain();

osc.connect(gain);
gain.connect(audio.destination);

osc.frequency.value=freq;
osc.type="triangle";

gain.gain.value=0.15;

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+duration
);

osc.stop(audio.currentTime+duration);

}

function correctSound(){

if(!document.getElementById("soundMode").checked) return;

playTone(700,.08);

setTimeout(()=>{
playTone(900,.12);
},90);

}

function wrongSound(){

if(!document.getElementById("soundMode").checked) return;

playTone(180,.25);

}

function finishSound() {
    if(!document.getElementById("soundMode").checked) return;
    // 必要であればここにAudioContextを使用した処理を追加
}

// 状態管理
let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function start() {
    quiz = shuffle(quizData); // 直接 quizData をシャッフル
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "grid";
    document.querySelector(".card").style.display = "flex";
    nextQuestion();
}
function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").textContent = current.emoji;
    document.getElementById("question").innerHTML =
        document.getElementById("mode").checked ? current.kanji : current.kana;
    
    document.getElementById("romaji").textContent =
        document.getElementById("romajiMode").checked ? current.romaji : "---";

    document.getElementById("groupDisplay").textContent = current.group ?? "";
    
    // 追加: exDisplayを表示させる処理
    document.getElementById("exDisplay").textContent = current.ex ?? "";
}
function showQuestion() {
    const current = quizData[currentIndex];

    emoji.textContent = current.emoji;
    question.innerHTML =
        mode.checked ? current.kanji : current.kana;
}
function nextQuestion() {
    document.getElementById("message").textContent = "";
    // スコア部分を「現在の問目 / トータルの問題数」に変更[cite: 1]
    document.getElementById("correct").textContent = index + 1;
    document.getElementById("total").textContent = quiz.length;

    // 終了
    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").textContent = stars;
        document.getElementById("finalScore").textContent =
            `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    const current = quiz[index];

    // 問題表示
    updateView();

    // 選択肢
    let choices = [current.en];

    while (choices.length < 4) {
        let word = quizData[Math.floor(Math.random() * quizData.length)].en;
        if (!choices.includes(word)) {
            choices.push(word);
        }
    }

    choices = shuffle(choices);

    let html = "";
    choices.forEach(choice => {
        html += `<div class="answer" onclick="answer(this,'${choice}')">${choice}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}
function answer(element, choice) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choice === current.en) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").textContent = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        document.getElementById("message").textContent = "❌ " + current.en;
        wrongSound();
    }

    setTimeout(() => {
        index++;
        nextQuestion();
    }, 1000);
}

function restart() {
    start();
}

// 初期実行
start();

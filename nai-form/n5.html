<style>

body{

}

.controls label {

    align-items: center;

}
.emoji{

.question{

}
.quiz-container{

}

.card {
    background-color: var(--card-bg);

    max-width: 600px;
    margin: 0 auto 15px auto;

    flex-direction: column;
    align-items: center;
    box-sizing: border-box;

#emojiDisplay { 
    font-size: 40px; 
    margin-bottom: 5px; 
}

#groupDisplay { 
    margin-bottom: 5px; 
    color: #8b5cf6;
    font-size: 14px;
}

#romaji {

    width: 100%;
}

#question {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 10px;
}

#answers{

    gap:10px;
    margin-top:10px;
}

.answer{
    padding:14px;
    font-size:18px;
    font-weight: bold;
    background:white;
    border:3px solid var(--border-color);

    cursor:pointer;

    text-align: center;
    box-sizing: border-box;

.answer:hover{
    transform:scale(1.02);
}

ruby rt {
    color: #8b5cf6;
    font-size: 0.5em;

#romaji{

    padding-top:12px;

    font-size:18px;
    font-weight:normal;

    color:#8b7fbf;
    text-align:center;
}

#explanation {
    margin-top: 20px !important;

    color: red !important;
    font-weight: bold;
    min-height: 40px;
    text-align: center;
}

.correct{
    background:#d1fae5;
    border-color:var(--correct);
}

.wrong{
    background:#fee2e2;
    border-color:var(--wrong);
}

#score {
    margin-top: 10px; 
    font-size: 20px;
    font-weight: bold;
    text-align: center; 
}

#message{
    height:30px;
    margin-top:10px; 
    font-size:22px;
    font-weight:bold;
    text-align: center;
}

button {
    margin-top: 25px;
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold; 
    background: #818cf8;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    display: none;
    transition: transform 0.2s; 
}

button:hover {
    transform: scale(1.05); 
}

@keyframes bounce{
    0%{transform:scale(1);}
    35%{transform:scale(1.08);}
    60%{transform:scale(.95);}
    100%{transform:scale(1);}
}

@keyframes shake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
    100%{transform:translateX(0);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.bounce{
    animation:bounce .45s;
}

.shake{
    animation:shake .45s;
}

.fade{
    animation:fadeIn .4s;
}

    display:none;
    text-align:center;
    margin-top:30px;
    animation:fadeIn .7s;
}

#stars{
    font-size:50px;
    margin:20px 0;
    cursor: pointer;
    display: inline-block;
    color:#facc15;
}

#result h2{
    font-size:38px;
    margin:10px;
    color:#7c3aed;
}

#result p{
    font-size:22px;
    font-weight:bold;
}

#result + button {
    display: block; 
}
</style>

const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){
    const osc=audio.createOscillator();
    const gain=audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value=freq;
    osc.type="triangle";
    gain.gain.value=0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime+duration);
    osc.stop(audio.currentTime+duration);
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700,.08);
    setTimeout(()=>{ playTone(900,.12); },90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180,.25);
}

let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function start() {
    quiz = shuffle(quizData); 
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    document.getElementById("score").style.display = "block";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").textContent = current.emoji;
    document.getElementById("question").innerHTML =
        document.getElementById("mode").checked ? current.kanji : current.kana;
    
    document.getElementById("romaji").textContent =
        document.getElementById("romajiMode").checked ? (current.romaji || "") : "";

    document.getElementById("groupDisplay").textContent = current.group ?? "";
    document.getElementById("enDisplay").textContent = current.en ?? "";
}

function nextQuestion() {
    document.getElementById("message").textContent = "";
    
    document.getElementById("correct").textContent = index + 1;
    document.getElementById("total").textContent = quiz.length;

    if (index >= quiz.length) {
        document.getElementById("controlsArea").style.display = "none";
        document.getElementById("quizContainer").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        
        document.getElementById("homeLinkArea").style.display = "block";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").textContent = stars;
        document.getElementById("finalScore").textContent =
            `Score: ${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    const current = quiz[index];
    updateView(); 

    let choices = shuffle(current.choices); 

    let html = "";
    choices.forEach(choice => {
        html += `<div class="answer" onclick="answer(this,'${choice}')">${choice}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(element, choice) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    const explanationDiv = document.getElementById("explanation");
    explanationDiv.textContent = ""; 

    if (choice === current.nai) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").textContent = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        element.style.borderColor = "var(--wrong)";
        
        document.getElementById("message").textContent = "❌ Correct answer: " + current.nai;
        
        if(current.exp) {
            explanationDiv.textContent = "Exp: " + current.exp; 
        }
        wrongSound();
    }

    setTimeout(() => {
        index++;
        explanationDiv.textContent = ""; 
        nextQuestion();
    }, 2500); 
}

function restart() {
    start();
}

start();
</script>

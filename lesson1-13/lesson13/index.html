<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minna no Nihongo Lesson 13 Quiz</title>

<style>
:root{
--bg-color:#f5f3ff;
--card-bg:#ffffff;
--primary:#a78bfa;
--text-main:#4c1d95;
--border-color:#f3e8ff;
--accent-pink:#f172a3;
--correct:#10b981;
--wrong:#ef4444;
}

body{
font-family:'Nunito',sans-serif;
background:var(--bg-color);
display:flex;
flex-direction:column;
align-items:center;
padding: 10px 20px;
margin:0;
color:var(--text-main);
}

h1 {
    margin-top: 10;     
    margin-bottom: 5px; 
    font-size: 28px;   
}

.controls {
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* 左端に寄せる */
    margin: 0 auto 15px auto; /* 画面中央に配置 */
    width: 180px; /* 全体の幅を固定して、ラベルの開始位置を揃える */
}

.controls label {
    display: flex;
    align-items: center;
    gap: 10px; /* チェックボックスと文字の間隔 */
    text-align: left;
}
/* 問題カードはそのままに */
.card {
    background-color: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 18px;
    padding: 20px;
    width: 90%;
    max-width: 280px;
    margin: 0 auto 10px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 選択肢ボタンを小さくして見栄えを整える */
.answers {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px; /* ボタン同士の隙間を詰める */
    width: 90%;
    max-width: 300px; /* カードより少し幅を狭くする */
    margin: 0 auto 10px auto;
}

.answer {
    padding: 10px 15px;
    font-size: 16px;
    font-weight: bold; /* ここを太字に設定 */
    border-width: 2px;
    border-style: solid; /* 枠線が消えないよう念のため指定 */
    border-color: var(--border-color);
    border-radius: 18px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: .2s;
}

/* ルビの色 */
ruby rt {
    color: #8b5cf6;
    font-size: 0.5em;
    font-weight: bold;
}
#question{
font-size:34px;
font-weight:bold;
}

#romaji{

margin-top:15px;

padding-top:12px;

width:80%;

border-top:2px solid #ece8ff;

font-size:18px;

font-weight:normal;

letter-spacing:2px;

color:#8b7fbf;

text-align:center;

}

.answer{
padding:14px;
font-size:18px;
background:white;
border:3px solid var(--border-color);
border-radius:18px;
cursor:pointer;
transition:.2s;
}

.answer:hover{
transform:scale(1.02);
}

.correct{
background:#d1fae5;
border-color:var(--correct);
}

.wrong{
background:#fee2e2;
border-color:var(--wrong);
}

/* スコアエリアの調整 */
#score {
    margin-top: 20px; 
    font-size: 20px;
    font-weight: bold;
    text-align: center; /* 真ん中寄せ */
}

#message{
height:20px;
margin-top:10px; 
font-size:22px;
font-weight:bold;
text-align: center;
}

button {
    margin-top: 25px;
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold; /* ここを太字に設定 */
    background: #818cf8;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    display: none;
    transition: transform 0.2s; /* おまけで軽く動く演出 */
}

button:hover {
    transform: scale(1.05); /* ホバー時に少し大きく */
}
/* ---------- Animation ---------- */

@keyframes bounce{
0%{transform:scale(1);}
35%{transform:scale(1.08);}
60%{transform:scale(.95);}
100%{transform:scale(1);}
}

@keyframes shake{
0%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-8px);}
80%{transform:translateX(8px);}
100%{transform:translateX(0);}
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.bounce{
animation:bounce .45s;
}

.shake{
animation:shake .45s;
}

.fade{
animation:fadeIn .4s;
}

/* ---------- Result ---------- */

#result{

display:none;

text-align:center;

margin-top:30px;

animation:fadeIn .7s;

}

#stars{

font-size:42px;

margin:20px 0;

color:#facc15;

}

#result h2{

font-size:38px;

margin:10px;

color:#7c3aed;

}

#result p{

font-size:22px;

font-weight:bold;

}
/* 結果画面表示中にカードを隠す */
#result + button {
    display: block; /* Play Againボタンは表示 */
}
/* 星を少し華やかにする */
#stars {
    font-size: 50px; /* 星を少し大きく */
    margin: 20px 0;
    cursor: pointer;
    display: inline-block;
}
</style>
</head>

<body>

<h1>🌟Lesson 13🌟</h1>

<div class="controls">
<label>
<input type="checkbox" id="mode">
Kanji Mode
</label>
<label>
<input type="checkbox" id="romajiMode" checked>
Show Romaji
</label>
<label>
<input type="checkbox" id="soundMode" checked>
Sound Effects
</label>

</div>

<div class="card">

<div id="question"></div>

<div id="romaji"></div>

</div>

<div class="answers" id="answers"></div>

<div id="message"></div>

<!-- スコアエリア -->
<div id="score">
    <span id="correct">0</span> / <span id="total">0</span>
</div>



<div id="result">

<h2>🎉 Great Job! 🎉</h2>

<div id="stars"></div>

<p id="finalScore"></p>

</div>
<button onclick="restart()">Play Again</button>

<div style="text-align: center; margin-top: 20px; margin-bottom: 20px;">
    <a class="back" href="../index.html">← Back to Home</a>
</div>
<script>
// ===== Sound =====

const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){

const osc=audio.createOscillator();
const gain=audio.createGain();

osc.connect(gain);
gain.connect(audio.destination);

osc.frequency.value=freq;
osc.type="triangle";

gain.gain.value=0.15;

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+duration
);

osc.stop(audio.currentTime+duration);

}

function correctSound(){

if(!document.getElementById("soundMode").checked) return;

playTone(700,.08);

setTimeout(()=>{
playTone(900,.12);
},90);

}

function wrongSound(){

if(!document.getElementById("soundMode").checked) return;

playTone(180,.25);

}

function finishSound() {
    if(!document.getElementById("soundMode").checked) return;
    // 必要であればここにAudioContextを使用した処理を追加
}
const data = [
        // 動詞
        { k: "<ruby>買<rt>か</rt></ruby>い<ruby>物<rt>もの</rt></ruby>します", r: "かいものします", m: "kaimonoshimasu", a: "do shopping", cat: "verb" },
        { k: "<ruby>食事<rt>しょくじ</rt></ruby>します", r: "しょくじします", m: "shokujishimasu", a: "have a meal", cat: "verb" },
        { k: "<ruby>散歩<rt>さんぽ</rt></ruby>します", r: "さんぽします", m: "sanposhimasu", a: "take a walk", cat: "verb" },
        { k: "<ruby>疲<rt>つか</rt></ruby>れます", r: "つかれます", m: "tsukaremasu", a: "get tired", cat: "verb" },
        { k: "お<ruby>腹<rt>なか</rt></ruby>がすきました", r: "おなかがすきました", m: "onakagasukimashita", a: "I’m hungry", cat: "verb" },
        { k: "お<ruby>腹<rt>なか</rt></ruby>がいっぱいです", r: "おなかいっぱいです", m: "onakaippaidesu", a: "I’m full", cat: "verb" },
        { k: "<ruby>喉<rt>のど</rt></ruby>が<ruby>乾<rt>かわ</rt></ruby>きました", r: "のどがかわきました", m: "nodogakawakimashita", a: "I’m thirsty", cat: "verb" },
        { k: "<ruby>結婚<rt>けっこん</rt></ruby>します", r: "けっこんします", m: "kekkonshimasu", a: "marry", cat: "verb" },
        { k: "<ruby>出<rt>だ</rt></ruby>します", r: "だします", m: "dashimasu", a: "send [a letter]", cat: "verb" },
        { k: "<ruby>入<rt>はい</rt></ruby>ります", r: "はいります", m: "hairimasu", a: "enter", cat: "verb" },
        { k: "<ruby>出<rt>で</rt></ruby>ます", r: "でます", m: "demasu", a: "go out", cat: "verb" },
        { k: "<ruby>迎<rt>むか</rt></ruby>えます", r: "むかえます", m: "mukaemasu", a: "go to meet, welcome", cat: "verb" },
        { k: "<ruby>遊<rt>あそ</rt></ruby>びます", r: "あそびます", m: "asobimasu", a: "play, hang out", cat: "verb" },
        { k: "<ruby>泳<rt>およ</rt></ruby>ぎます", r: "およぎます", m: "oyogimasu", a: "swim", cat: "verb" },
        // い形容詞
        { k: "<ruby>広<rt>ひろ</rt></ruby>い", r: "ひろい", m: "hiroi", a: "wide, spacious", cat: "i-adjective" },
        { k: "<ruby>狭<rt>せま</rt></ruby>い", r: "せまい", m: "semai", a: "narrow", cat: "i-adjective" },
        { k: "<ruby>欲<rt>ほ</rt></ruby>しい", r: "ほしい", m: "hoshii", a: "want", cat: "i-adjective" },
        { k: "<ruby>寂<rt>さび</rt></ruby>しい", r: "さびしい", m: "sabishii", a: "lonely", cat: "i-adjective" },
        // な形容詞
        { k: "<ruby>大変<rt>たいへん</rt></ruby>", r: "たいへん", m: "taihen", a: "hard", cat: "na-adjective" },
        // 名詞
        { k: "スキー", r: "すきー", m: "sukii", a: "skiing", cat: "noun" },
        { k: "プール", r: "ぷーる", m: "puuru", a: "swimming pool", cat: "noun" },
        { k: "川", r: "かわ", m: "kawa", a: "river", cat: "noun" },
        { k: "<ruby>美術<rt>びじゅつ</rt></ruby>", r: "びじゅつ", m: "bijutsu", a: "arts", cat: "noun" },
        { k: "<ruby>釣<rt>つ</rt></ruby>り", r: "つり", m: "tsuri", a: "fishing", cat: "noun" },
        { k: "<ruby>会議<rt>かいぎ</rt></ruby>", r: "かいぎ", m: "kaigi", a: "meeting", cat: "noun" },
        { k: "<ruby>服<rt>ふく</rt></ruby>", r: "ふく", m: "fuku", a: "clothes", cat: "noun" },
        { k: "<ruby>帽子<rt>ぼうし</rt></ruby>", r: "ぼうし", m: "boushi", a: "hat", cat: "noun" },
        { k: "デート", r: "でーと", m: "deeto", a: "date", cat: "noun" },
        { k: "<ruby>彼女<rt>かのじょ</rt></ruby>", r: "かのじょ", m: "kanojo", a: "girlfriend", cat: "noun" },
        { k: "<ruby>彼氏<rt>かれし</rt></ruby>", r: "かれし", m: "kareshi", a: "boyfriend", cat: "noun" },
        { k: "<ruby>祭<rt>まつ</rt></ruby>り", r: "まつり", m: "matsuri", a: "festival", cat: "noun" }
    ];



let quiz=[];
let index=0;
let score=0;

function shuffle(array){
return [...array].sort(()=>Math.random()-0.5);
}

function start(){

quiz=shuffle(data);

index=0;
score=0;

document.querySelector("button").style.display="none";

nextQuestion();

}

function nextQuestion(){

document.getElementById("message").textContent="";

    // スコア部分を「現在の問目 / トータルの問題数」に変更[cite: 1]
    document.getElementById("correct").textContent = index + 1;
    document.getElementById("total").textContent = quiz.length;

if(index>=quiz.length){

    finishSound();

    document.getElementById("question").innerHTML = ""; 
    document.getElementById("romaji").textContent = "";
    document.getElementById("question").style.display="none"; 
    document.querySelector(".card").style.display = "none";

    document.getElementById("answers").style.display="none";

    document.getElementById("message").style.display="none";

    document.getElementById("score").style.display="none";
    document.querySelector(".controls").style.display = "none";
    document.querySelector("h1").style.display = "none"; 
    
let rate=score/data.length;

let stars="⭐";

if(rate===1){

stars="⭐⭐⭐⭐⭐";

}else if(rate>=0.8){

stars="⭐⭐⭐⭐";

}else if(rate>=0.6){

stars="⭐⭐⭐";

}else if(rate>=0.4){

stars="⭐⭐";

}

document.getElementById("stars").textContent=stars;

document.getElementById("finalScore").innerHTML=
`${score} / ${data.length}`;

document.getElementById("result").style.display="block";

document.querySelector("button").style.display="block";

return;

}

let current=quiz[index];

document.getElementById("question").innerHTML=
document.getElementById("mode").checked
?current.k
:current.r;
document.getElementById("romaji").textContent =
document.getElementById("romajiMode").checked
? (current.m || "")
: "";

let choices=[current.a];

while(choices.length<4){

let word=data[Math.floor(Math.random()*data.length)].a;

if(!choices.includes(word))
choices.push(word);

}

choices=shuffle(choices);

let html="";

choices.forEach(choice=>{

html+=`<div class="answer"
onclick="answer(this,'${choice.replace(/'/g,"\\'")}')">${choice}</div>`;

});

document.getElementById("answers").innerHTML=html;

}

function answer(element,choice){

let current=quiz[index];

const card=document.getElementById("question");

document.querySelectorAll(".answer").forEach(btn=>{

btn.onclick=null;

if(btn.textContent===current.a){

btn.classList.add("correct");

}

});

if(choice===current.a){

score++;

correctSound();

card.classList.remove("bounce");

void card.offsetWidth;

card.classList.add("bounce");

document.getElementById("message").textContent="✨ Correct!";

}else{

wrongSound();

element.classList.add("wrong");

card.classList.remove("shake");

void card.offsetWidth;

card.classList.add("shake");

document.getElementById("message").textContent="❌ "+current.a;

}

setTimeout(()=>{

index++;

nextQuestion();

},1000);

}

function restart(){

document.getElementById("question").style.display="flex";

document.getElementById("answers").style.display="grid";

document.getElementById("message").style.display="block";

document.getElementById("score").style.display="block";

document.getElementById("result").style.display="none";

start();

}

document.getElementById("mode")
.addEventListener("change",nextQuestion);

document.getElementById("romajiMode")
.addEventListener("change",nextQuestion);

start();


</script>

</body>
</html>

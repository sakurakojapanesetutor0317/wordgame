// ===== Sound =====
let audio = null;

function getAudioContext() {
    if (!audio) {
        audio = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audio;
}

function playTone(freq, duration){
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = freq;
    osc.type = "triangle";
    gain.gain.value = 0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700, .08);
    setTimeout(() => { playTone(900, .12); }, 90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180, .25);
}

// 状態管理
let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function generateChoices(current){

    let choices=[];

    if(current.group===2){

        const word=current.dictionary;
        const stem=word.slice(0,-1);

        const vowels={
            "い":"う",
            "き":"く",
            "ぎ":"ぐ",
            "し":"す",
            "ち":"つ",
            "に":"ぬ",
            "び":"ぶ",
            "み":"む",
            "り":"る",
            "え":"う",
            "け":"く",
            "げ":"ぐ",
            "せ":"す",
            "て":"つ",
            "ね":"ぬ",
            "へ":"ふ",
            "べ":"ぶ",
            "め":"む",
            "れ":"る"
        };

        const last=stem.slice(-1);

        const fake1=stem.slice(0,-1)+(vowels[last]||last)+"る";
        const fake2=stem+"く";
        const fake3=fake1.slice(0,-1)+"く";

        choices=[
            word,
            fake1,
            fake2,
            fake3
        ];

}else if(current.group===3){
        const word = current.dictionary;
        if(word === "する"){
            choices = ["する", "しる", "すく", "しく"];
        }else if(word === "くる"){
            choices = ["くる", "きる", "くく", "きく"];
        }else if(word.endsWith("する")){
            const stem = word.slice(0, -2);
            choices = [
                word,
                stem + "きる",
                stem + "くる",
                stem + "すく"
            ];
        }else{
            choices = [
                word,
                "くる",
                "きる",
                "すく"
            ];
        }


    }else{

        const word=current.dictionary;

        const stem=current.kana.replace("ます","");

        const lastKana=stem.slice(-1);

        const map={
            "い":"う",
            "き":"く",
            "ぎ":"ぐ",
            "し":"す",
            "ち":"つ",
            "に":"ぬ",
            "び":"ぶ",
            "み":"む",
            "り":"る"
        };

        const eMap={
            "い":"え",
            "き":"け",
            "ぎ":"げ",
            "し":"せ",
            "ち":"て",
            "に":"ね",
            "び":"べ",
            "み":"め",
            "り":"れ"
        };

        choices=[
            word,
            stem+"る",
            stem.slice(0,-1)+eMap[lastKana]+"る",
            stem+map[lastKana]
        ];

    }

    return shuffle([...new Set(choices)]);
}


function start() {
    quiz = shuffle(quizData);
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").textContent = current.emoji;
    document.getElementById("question").innerHTML =
        document.getElementById("mode").checked ? current.kanji : current.kana;
    
    document.getElementById("romaji").textContent =
        document.getElementById("romajiMode").checked ? current.romaji : "---";

    document.getElementById("groupDisplay").textContent = current.group ? `Group ${current.group}` : "";
    document.getElementById("exDisplay").textContent = current.ex ?? "";
}

function showQuestion(){

    currentQuestion=quizData[currentIndex];

    emoji.textContent=currentQuestion.emoji;

    question.innerHTML=currentQuestion.kanji;

    romaji.textContent=currentQuestion.romaji;

    const choices=generateChoices(currentQuestion);

    shuffle(choices);

    answerButtons.innerHTML="";

    choices.forEach(choice=>{

        const btn=document.createElement("button");

        btn.className="answer";

        btn.textContent=choice;

        btn.onclick=()=>checkAnswer(choice);

        answerButtons.appendChild(btn);

    });

}
function nextQuestion() {
    document.getElementById("message").textContent = "";
    document.getElementById("correct").textContent = score;
    document.getElementById("total").textContent = index;

    // 終了判定
    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        document.querySelector(".card").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").textContent = stars;
        document.getElementById("finalScore").textContent = `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    document.getElementById("total").textContent = index + 1;
    const current = quiz[index];

    updateView();

    // 自動生成したひっかけ選択肢を使う
    let choices = generateChoices(current);

    let html = "";
    choices.forEach(choice => {
        html += `<div class="answer" onclick="answer(this,'${choice}')">${choice}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(element, choice) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choice === current.dictionary) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").textContent = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        document.getElementById("message").textContent = "❌ " + current.dictionary;
        wrongSound();
    }

    setTimeout(() => {
        index++;
        nextQuestion();
    }, 1000);
}

function restart() {
    start();
}

window.addEventListener("DOMContentLoaded", () => {
    start();
});

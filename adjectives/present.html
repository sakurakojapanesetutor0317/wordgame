.correct{

.wrong{

#message{

// ===== Sound =====
const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){
    const osc=audio.createOscillator();
    const gain=audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value=freq;
    osc.type="triangle";
    gain.gain.value=0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime+duration);
    osc.stop(audio.currentTime+duration);
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700,.08);
    setTimeout(()=>{ playTone(900,.12); },90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180,.25);
}

let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

// quizDataの単語リストには無いが、わざと違う（不正解の）選択肢として
// 使われている語に手動でルビを設定
const extraKanji = {
    "こわい": "<ruby>怖<rt>こわ</rt></ruby>い",
    "めずらしい": "<ruby>珍<rt>めずら</rt></ruby>しい",
    "ただしい": "<ruby>正<rt>ただ</rt></ruby>しい",
    "きびしい": "<ruby>厳<rt>きび</rt></ruby>しい",
    "ていねい": "<ruby>丁寧<rt>ていねい</rt></ruby>",
    "にんきじゃない": "<ruby>人気<rt>にんき</rt></ruby>じゃない",
    "にんきくない": "<ruby>人気<rt>にんき</rt></ruby>くない",
    "かわいじゃない": "<ruby>可愛<rt>かわい</rt></ruby>じゃない",
    "うまい": "<ruby>美味<rt>うま</rt></ruby>い",
    "いいくない": "<ruby>良<rt>い</rt></ruby>いくない",
    "いくない": "<ruby>良<rt>い</rt></ruby>くない"
};

// quizDataに完全一致する読みが無い選択肢（間違った活用パターンのダミー等）でも、
// 元になった単語の漢字・ルビ部分を流用してルビ付き表記を組み立てる
function buildKanjiFromKana(kana) {
    if (extraKanji[kana]) return extraKanji[kana];

    let bestMatch = null;
    for (const item of quizData) {
        if (!item.kanji) continue;
        if (kana.startsWith(item.kana) && (!bestMatch || item.kana.length > bestMatch.kana.length)) {
            bestMatch = item;
        }
    }
    if (!bestMatch) return kana; // 一致する語幹が無ければルビ無しでそのまま表示
    return bestMatch.kanji + kana.slice(bestMatch.kana.length);
}

function start() {
    quiz = shuffle(quizData);
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    document.getElementById("score").style.display = "block";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").innerHTML = current.emoji;

    const groupEl = document.getElementById("groupDisplay");
    groupEl.className = current.group; // "i-adj" または "na-adj" のCSSクラスを付与
    const groupIcon = current.group === "i-adj" ? "🔹" : "🔷";
    groupEl.innerHTML = groupIcon + " " + current.group;


    // 問題として「英単語」を表示
    document.getElementById("question").innerHTML = current.en;
    
    renderAnswers();
}

function nextQuestion() {
    document.getElementById("message").innerHTML = "";
    document.getElementById("currentNum").innerHTML = index + 1;
    document.getElementById("totalNum").innerHTML = quiz.length;

    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        document.querySelector(".card").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").innerHTML = stars;
        document.getElementById("finalScore").innerHTML = `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    const current = quiz[index];

    // 選択肢（日本語）をシャッフル
    let choices = current.options.map(optKana => {
        let found = quizData.find(item => item.kana === optKana);
        return found ? found : { kanji: buildKanjiFromKana(optKana), kana: optKana };
    });

    quiz[index].currentChoices = shuffle(choices);

    updateView();
}

document.getElementById("mode").addEventListener("change", () => {
    renderAnswers();
});

function renderAnswers() {
    if (quiz.length === 0 || index >= quiz.length) return;
    const current = quiz[index];
    
    const isKanjiMode = document.getElementById("mode").checked;

    let html = "";
    current.currentChoices.forEach(item => {
        let mainText = isKanjiMode ? (item.kanji || item.kana) : item.kana;

        html += `
            <div class="answer" onclick="answer(this, '${item.kana}')">
                <div>${mainText}</div>
            </div>
        `;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(element, choiceKana) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choiceKana === current.kana) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").innerHTML = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        let correctDisplay = document.getElementById("mode").checked ? current.kanji : current.kana;
        document.getElementById("message").innerHTML = "❌ " + correctDisplay;
        wrongSound();
    }

    setTimeout(() => {
        index++;
        nextQuestion();
    }, 1000);
}

function restart() {
    start();
}

start();

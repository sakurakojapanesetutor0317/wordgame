// ===== Sound =====
const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){
    const osc=audio.createOscillator();
    const gain=audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value=freq;
    osc.type="triangle";
    gain.gain.value=0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime+duration);
    osc.stop(audio.currentTime+duration);
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700,.08);
    setTimeout(()=>{ playTone(900,.12); },90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180,.25);
}

  { emoji: "➡️", en: "straight ahead, direct", kanji: "<ruby>真<rt>ま</rt></ruby>っ<ruby>直<rt>す</rt></ruby>ぐ", kana: "まっすぐ", romaji: "massugu", group: "na-adj", ex: "Dictionary：まっすぐな" },
  { emoji: "🏙️", en: "bustling, busy", kanji: "<ruby>賑<rt>にぎ</rt></ruby>やか", kana: "にぎやか", romaji: "nigiyaka", group: "na-adj", ex: "Dictionary：にぎやかな" },
  { emoji: "🌟", en: "splendid", kanji: "<ruby>立派<rt>りっぱ</rt></ruby>", kana: "りっぱ", romaji: "rippa", group: "na-adj", ex: "Dictionary：りっぱな" },
  { emoji: "🤫", en: "quiet", kanji: "<ruby>静<rt>しず</rt></ruby>か", kana: "しずか", romaji: "shizuka", group: "na-adj", ex: "Dictionary：しずかな" },
  { emoji: "💖", en: "like", kanji: "<ruby>好<rt>す</rt></ruby>き", kana: "すき", romaji: "suki", group: "na-adj", ex: "Dictionary：すきな" },
  { emoji: "🔥", en: "very; greatly; terribly; difficult", kanji: "<ruby>大変<rt>たいへん</rt></ruby>", kana: "たいへん", romaji: "taihen", group: "na-adj", ex: "Dictionary：たいへんな" },
  { emoji: "⭐", en: "important; necessary; beloved", kanji: "<ruby>大切<rt>たいせつ</rt></ruby>", kana: "たいせつ", romaji: "taisetsu", group: "na-adj", ex: "Dictionary：たいせつな" },
  { emoji: "⭐", en: "famous", kanji: "<ruby>有名<rt>ゆうめい</rt></ruby>", kana: "ゆうめい", romaji: "yuumei", group: "na-adj", ex: "Dictionary：ゆうめいな" }
];

// 状態管理
let quiz = [];
let index = 0;
let score = 0;

function shuffle(array) {
    return [...array].sort(() => Math.random() - 0.5);
}

function start() {
    quiz = shuffle(quizData);
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    document.getElementById("score").style.display = "block";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").textContent = current.emoji;
    document.getElementById("question").innerHTML =
        document.getElementById("mode").checked ? current.kanji : current.kana;
    
    document.getElementById("romaji").textContent =
        document.getElementById("romajiMode").checked ? current.romaji : "---";

    document.getElementById("groupDisplay").textContent = current.group ?? "";
    document.getElementById("exDisplay").textContent = current.ex ?? "";
}

function nextQuestion() {
    document.getElementById("message").textContent = "";
    document.getElementById("currentNum").textContent = index + 1;
    document.getElementById("totalNum").textContent = quiz.length;

    // 終了判定
    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        document.querySelector(".card").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").textContent = stars;
        document.getElementById("finalScore").textContent = `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    const current = quiz[index];

    // 問題表示の更新
    updateView();

    // 4つの選択肢を作成（正解1つ ＋ ランダムな不正解3つ）
    let choices = [current.en];

    while (choices.length < 4) {
        let word = quizData[Math.floor(Math.random() * quizData.length)].en;
        if (!choices.includes(word)) {
            choices.push(word);
        }
    }

    choices = shuffle(choices);

    let html = "";
    choices.forEach(choice => {
        html += `<div class="answer" onclick="answer(this,'${choice}')">${choice}</div>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(element, choice) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choice === current.en) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").textContent = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        document.getElementById("message").textContent = "❌ " + current.en;
        wrongSound();
    }

    setTimeout(() => {
        index++;
        nextQuestion();
    }, 1000);
}

function restart() {
    start();
}

// 初期実行
start();
</script>

#question {

    background: white;

.answer:hover{

.correct{

    border-color:var(--correct);
}

.wrong{
    background:#fee2e2;

ruby rt {

#message{

    font-weight:bold;
    text-align: center;

// ===== Sound =====
const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq,duration){
    const osc=audio.createOscillator();
    const gain=audio.createGain();

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.frequency.value=freq;
    osc.type="triangle";
    gain.gain.value=0.15;

    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime+duration);
    osc.stop(audio.currentTime+duration);
}

function correctSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(700,.08);
    setTimeout(()=>{ playTone(900,.12); },90);
}

function wrongSound(){
    if(!document.getElementById("soundMode").checked) return;
    playTone(180,.25);
}

// quizDataの単語リストには無いが、わざと違う（不正解の）選択肢として
// 使われている語に手動でルビを設定（辞書形などの基本形だけ登録すればOK。
// 「くない/じゃない/かった/だった/くなかった/じゃなかった」等の活用は
// buildKanjiFromKana が自動的に組み立てる）
const extraKanji = {
    "こわい": "<ruby>怖<rt>こわ</rt></ruby>い",
    "めずらしい": "<ruby>珍<rt>めずら</rt></ruby>しい",
    "ただしい": "<ruby>正<rt>ただ</rt></ruby>しい",
    "きびしい": "<ruby>厳<rt>きび</rt></ruby>しい",
    "ていねい": "<ruby>丁寧<rt>ていねい</rt></ruby>",
    "にんき": "<ruby>人気<rt>にんき</rt></ruby>",
    "うまい": "<ruby>美味<rt>うま</rt></ruby>い",
    // 「いい/よい」の不規則な間違いパターン（辞書データから自動導出できないので個別指定）
    "いくない": "<ruby>良<rt>い</rt></ruby>くない",
    "いいくない": "<ruby>良<rt>い</rt></ruby>いくない",
    "いくなかった": "<ruby>良<rt>い</rt></ruby>くなかった",
    "いいくなかった": "<ruby>良<rt>い</rt></ruby>いくなかった",
    "いかった": "<ruby>良<rt>い</rt></ruby>かった",
    "いいかった": "<ruby>良<rt>い</rt></ruby>いかった",
    "かわいじゃない": "<ruby>可愛<rt>かわい</rt></ruby>じゃない",
    "かわいじゃなかった": "<ruby>可愛<rt>かわい</rt></ruby>じゃなかった"
};

// quizDataに完全一致する読みが無い選択肢（間違った活用パターンのダミー等）でも、
// 元になった単語の漢字・ルビ部分を流用してルビ付き表記を組み立てる。
// 「語尾に追加する活用」（じゃない・だった等）と、
// 「い形容詞の末尾『い』を落として活用する形」（かった等）の両方に対応する。
function buildKanjiFromKana(kana) {
    if (extraKanji[kana]) return extraKanji[kana];

    const stems = [];
    quizData.forEach(item => {
        if (item.kanji) stems.push([item.kana, item.kanji]);
    });
    Object.keys(extraKanji).forEach(k => stems.push([k, extraKanji[k]]));

    let bestLen = -1;
    let bestKanji = null;

    stems.forEach(([stemKana, stemKanji]) => {
        // パターン1: 語尾に何かを追加しただけの形（じゃない・だった等）
        if (kana.startsWith(stemKana) && stemKana.length > bestLen) {
            bestLen = stemKana.length;
            bestKanji = stemKanji + kana.slice(stemKana.length);
        }
        // パターン2: い形容詞の末尾「い」を落として活用する形（かった）
        // ※ 末尾が正確に「かった」の場合のみ許可する。そうしないと、
        //   「おおい(多い)」の語幹「おお」が「おおきい(大きい)」の頭にも
        //   たまたま一致してしまい、別の単語なのに漢字を誤爆する
        //   （例: おおきいじゃなかった → 誤って「多」になる）といった事故が起きる。
        if (stemKana.endsWith("い")) {
            const trimmedKana = stemKana.slice(0, -1);
            if (trimmedKana.length > 0 && kana === trimmedKana + "かった" && trimmedKana.length > bestLen) {
                bestLen = trimmedKana.length;
                bestKanji = stemKanji.slice(0, -1) + "かった";
            }
        }
    });

    if (bestKanji === null) return kana; // 一致する語幹が無ければルビ無しでそのまま表示
    return bestKanji;
}

// 同じ読みでも違う漢字を持つ単語（例: やさしい＝易しい/優しい、あつい＝厚い/暑い/熱い）や、
// 「ない」が活用ではなく単語自体の一部である語（例: すくない＝少ない、あぶない＝危ない）が
// 混在しているため、以前は語尾のパターン（くない・だった等）を見て辞書形を推測していたが、
// それだと「すくなかった」のようにたまたま「くなかった」で終わる語（すくない＋かった）を
// 誤って「否定の過去形」と誤認し、漢字のHTMLタグを壊してしまう事故があった。
// そのため、各エントリのデータ自体に辞書形（base）を事前に正しく埋め込んであり、
// ここではそれをそのまま返すだけにする。
function getOwnBaseForm(entry) {
    if (entry.base && entry.base.kana) return entry.base;
    return { kana: entry.kana, kanji: entry.kanji }; // 念のためのフォールバック
}

// 選択肢optKanaが、entry自身の語幹（活用前の辞書形）から作られた
// 間違った活用パターンかどうかを調べ、一致すればentry自身の漢字を使って
// 組み立てる。一致しなければ null を返す（呼び出し側で他の方法にフォールバック）。
function buildOwnWordKanji(optKana, entry) {
    const base = getOwnBaseForm(entry);
    if (base.kana.length === 0) return null;

    if (optKana.startsWith(base.kana)) {
        return base.kanji + optKana.slice(base.kana.length);
    }
    if (base.kana.endsWith("い")) {
        const trimmed = base.kana.slice(0, -1);
        // 末尾が正確に「かった」の場合のみ許可する（他の理由は buildKanjiFromKana と同じ）
        if (trimmed.length > 0 && optKana === trimmed + "かった") {
            return base.kanji.slice(0, -1) + "かった";
        }
    }
    return null;
}

function start() {
    quiz = shuffle(quizData);
    index = 0;
    score = 0;
    document.querySelector("button").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("answers").style.display = "flex";
    document.querySelector(".card").style.display = "flex";
    document.getElementById("score").style.display = "block";
    nextQuestion();
}

function updateView() {
    if (quiz.length === 0 || index >= quiz.length) return;

    const current = quiz[index];

    document.getElementById("emojiDisplay").innerHTML = current.emoji;

    const groupEl = document.getElementById("groupDisplay");
    groupEl.className = current.group; // "i-adj" または "na-adj" のCSSクラスを付与
    const groupIcon = current.group === "i-adj" ? "🔹" : "🔷";
    groupEl.innerHTML = groupIcon + " " + current.group;


    // 問題として「英単語」を表示
    document.getElementById("question").innerHTML = current.en;
    
    renderAnswers();
}

function nextQuestion() {
    document.getElementById("message").innerHTML = "";
    document.getElementById("currentNum").innerHTML = index + 1;
    document.getElementById("totalNum").innerHTML = quiz.length;

    if (index >= quiz.length) {
        document.getElementById("answers").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("score").style.display = "none";
        document.querySelector(".card").style.display = "none";

        let rate = score / quiz.length;
        let stars =
            rate === 1 ? "⭐⭐⭐⭐⭐" :
            rate >= 0.8 ? "⭐⭐⭐⭐" :
            rate >= 0.6 ? "⭐⭐⭐" :
            rate >= 0.4 ? "⭐⭐" : "⭐";

        document.getElementById("stars").innerHTML = stars;
        document.getElementById("finalScore").innerHTML = `${score} / ${quiz.length}`;

        document.getElementById("result").style.display = "block";
        document.querySelector("button").style.display = "block";
        return;
    }

    const current = quiz[index];

    // 選択肢（日本語）をシャッフル
    let choices = current.options.map(optKana => {
        // 自分自身の答えは必ず自分自身のkanjiを使う
        // （やさしい＝易しい/優しいのように、同じ読みで違う漢字の単語がquizData内に
        //   複数あると、quizData.find が別の単語をヒットしてしまうことがあるため）
        if (optKana === current.kana) return current;

        // 自分自身の間違った活用パターン（例: 「優しい」の問題での「やさしいじゃない」）は
        // 自分自身の語幹の漢字を優先して組み立てる
        const ownWordKanji = buildOwnWordKanji(optKana, current);
        if (ownWordKanji) return { kanji: ownWordKanji, kana: optKana };

        // 自分自身の単語ではない場合は、他の単語からの完全一致を探す
        let found = quizData.find(item => item.kana === optKana);
        if (found) return found;

        // それでも見つからなければ汎用ロジックでルビを組み立てる
        return { kanji: buildKanjiFromKana(optKana), kana: optKana };
    });

    quiz[index].currentChoices = shuffle(choices);

    updateView();
}

document.getElementById("mode").addEventListener("change", () => {
    renderAnswers();
});

function renderAnswers() {
    if (quiz.length === 0 || index >= quiz.length) return;
    const current = quiz[index];
    
    const isKanjiMode = document.getElementById("mode").checked;

    let html = "";
    current.currentChoices.forEach(item => {
        let mainText = isKanjiMode ? (item.kanji || item.kana) : item.kana;

        html += `
            <div class="answer" onclick="answer(this, '${item.kana}')">
                <div>${mainText}</div>
            </div>
        `;
    });

    document.getElementById("answers").innerHTML = html;
}

function answer(element, choiceKana) {
    let current = quiz[index];
    document.querySelectorAll(".answer").forEach(btn => btn.onclick = null);

    if (choiceKana === current.kana) {
        score++;
        element.classList.add("correct");
        document.getElementById("message").innerHTML = "✨ Correct!";
        correctSound();
    } else {
        element.classList.add("wrong");
        let correctDisplay = document.getElementById("mode").checked ? current.kanji : current.kana;
        document.getElementById("message").innerHTML = "❌ " + correctDisplay;
        wrongSound();
    }

    setTimeout(() => {
        index++;
        nextQuestion();
    }, 1000);
}

function restart() {
    start();
}

start();
</script>
